<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Lembar Kisah Kita</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Lora:ital,wght@0,400;1,400&family=Montserrat:wght@300;400;600&display=swap");

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: linear-gradient(-45deg, #2b081d, #4a154b, #590d22, #38040e);
        background-size: 400% 400%;
        animation: gradientBG 15s ease infinite;
        overflow: hidden;
        font-family: "Montserrat", sans-serif;
        color: #fff;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        -webkit-font-smoothing: antialiased;
      }

      @keyframes gradientBG {
        0% {
          background-position: 0% 50%;
        }
        50% {
          background-position: 100% 50%;
        }
        100% {
          background-position: 0% 50%;
        }
      }

      /* --- KELOPAK BUNGA --- */
      #petal-container {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 1;
        pointer-events: none;
        opacity: 0;
        transition: opacity 2s ease-in;
      }

      .petal {
        position: absolute;
        width: 15px;
        height: 15px;
        background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
        border-radius: 15px 0 15px 0;
        box-shadow: 0 0 10px rgba(255, 154, 158, 0.5);
        top: -20px;
        animation:
          fall linear infinite,
          sway ease-in-out infinite alternate;
      }

      @keyframes fall {
        to {
          top: 110vh;
        }
      }
      @keyframes sway {
        from {
          transform: translateX(0px) rotate(0deg);
        }
        to {
          transform: translateX(100px) rotate(360deg);
        }
      }

      /* --- GERBANG MASUK --- */
      #entrance {
        position: absolute;
        z-index: 100;
        width: 100%;
        height: 100%;
        background: rgba(43, 8, 29, 0.95);
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        cursor: pointer;
        transition: opacity 1.5s ease;
      }

      .pulse-text {
        font-family: "Dancing Script", cursive;
        font-size: 2.5rem;
        color: #ff9a9e;
        text-shadow: 0 0 20px rgba(255, 154, 158, 0.6);
        animation: pulse 2s infinite;
      }

      @keyframes pulse {
        0%,
        100% {
          opacity: 0.6;
          transform: scale(1);
        }
        50% {
          opacity: 1;
          transform: scale(1.1);
          text-shadow: 0 0 30px #ff9a9e;
        }
      }

      /* --- TEKS SINEMATIK --- */
      #cinematic-text {
        position: absolute;
        z-index: 50;
        font-family: "Lora", serif;
        font-style: italic;
        font-size: 1.8rem;
        text-align: center;
        width: 90%;
        opacity: 0;
        transition: opacity 1.5s ease;
        color: #ffe6e6;
        text-shadow: 0 0 15px rgba(255, 182, 193, 0.6);
        pointer-events: none;
      }

      /* --- PANGGUNG UTAMA --- */
      #main-stage {
        display: none;
        position: absolute;
        z-index: 10;
        width: 100%;
        height: 100%;
        perspective: 2000px;
        opacity: 0;
        transition: opacity 2s ease-in;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      /* --- 3D FLIP BOOK (SUPER GEGAS TANPA DELAY) --- */
      .book-wrapper {
        position: relative;
        transition: transform 0.2s ease-out;
      }
      .book-wrapper.open {
        transform: translateX(180px);
      }

      .book {
        position: relative;
        width: 360px;
        height: 520px;
        transform-style: preserve-3d;
        user-select: none;
      }

      .page {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        transform-origin: left center;
        transform-style: preserve-3d;
        /* Durasinya dipangkas menjadi 0.5s agar instan dan tidak delay sama sekali */
        transition: transform 0.2s cubic-bezier(0.25, 1, 0.5, 1);
        cursor: pointer;
        touch-action: manipulation;
      }

      .front,
      .back {
        position: absolute;
        width: 100%;
        height: 100%;
        -webkit-backface-visibility: hidden;
        backface-visibility: hidden;
        background: #fffde7;
        box-shadow:
          inset 0 0 10px rgba(0, 0, 0, 0.05),
          2px 2px 10px rgba(0, 0, 0, 0.1);
        border-radius: 2px 15px 15px 2px;
        padding: 30px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        color: #333;
        outline: 1px solid transparent;
      }

      .back {
        border-radius: 15px 2px 2px 15px;
        -webkit-transform: rotateY(180deg) translateZ(1px);
        transform: rotateY(180deg) translateZ(1px);
      }

      .front {
        -webkit-transform: translateZ(1px);
        transform: translateZ(1px);
      }

      #page1 {
        transform: translateZ(4px);
        z-index: 4;
      }
      #page2 {
        transform: translateZ(3px);
        z-index: 3;
      }
      #page3 {
        transform: translateZ(2px);
        z-index: 2;
      }
      #page4 {
        transform: translateZ(1px);
        z-index: 1;
      }

      #page1.flipped {
        transform: rotateY(-180deg) translateZ(4px);
      }
      #page2.flipped {
        transform: rotateY(-180deg) translateZ(3px);
      }
      #page3.flipped {
        transform: rotateY(-180deg) translateZ(2px);
      }

      /* Isi Buku */
      .front img,
      .back img {
        width: 100%;
        height: 260px;
        object-fit: cover;
        border-radius: 8px;
        border: 4px solid #fff;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
      }
      .book-title {
        font-family: "Dancing Script", cursive;
        font-size: 2.5rem;
        color: #d81b60;
        text-align: center;
        margin-bottom: 20px;
        line-height: 1.1;
      }
      .book-caption {
        font-family: "Dancing Script", cursive;
        font-size: 1.8rem;
        color: #555;
        margin-top: 15px;
        text-align: center;
        line-height: 1.2;
      }
      .cover-front {
        background: linear-gradient(135deg, #d81b60, #880e4f);
        color: white;
        border: 2px solid #ff9a9e;
        box-shadow: 2px 2px 15px rgba(0, 0, 0, 0.2);
      }
      .cover-front h2 {
        font-family: "Dancing Script", cursive;
        font-size: 3.5rem;
        text-shadow: 0 2px 5px rgba(0, 0, 0, 0.5);
        text-align: center;
        line-height: 1.2;
      }
      .tap-hint {
        font-size: 1rem;
        margin-top: 50px;
        font-weight: 300;
        opacity: 0.8;
        animation: pulse 1.5s infinite;
      }

      .btn-love {
        background: #d81b60;
        color: #fff;
        border: none;
        padding: 15px 30px;
        font-size: 1.1rem;
        font-family: "Montserrat", sans-serif;
        font-weight: 600;
        border-radius: 30px;
        margin-top: 30px;
        cursor: pointer;
        box-shadow: 0 5px 15px rgba(216, 27, 96, 0.4);
        transition: 0.3s;
        -webkit-tap-highlight-color: transparent;
      }
      .btn-love:hover {
        transform: scale(1.05);
        background: #ff4081;
      }

      /* --- RESPONSIF HP --- */
      @media (max-width: 768px) {
        .book-wrapper.open {
          transform: translateX(24vw);
        }
        .book {
          width: 48vw;
          height: 75vw;
        }
        .front,
        .back {
          padding: 4vw;
          border-radius: 2px 12px 12px 2px;
        }
        .back {
          border-radius: 12px 2px 2px 12px;
        }
        .front img,
        .back img {
          height: 48%;
          border-width: 2px;
          border-radius: 6px;
        }

        .book-title {
          font-size: 6.5vw;
          margin-bottom: 3vw;
        }
        .book-caption {
          font-size: 4.8vw;
          margin-top: 3vw;
        }
        .cover-front h2 {
          font-size: 8.5vw;
        }
        .tap-hint {
          font-size: 3.5vw;
          margin-top: 8vw;
        }

        .btn-love {
          font-size: 4vw;
          padding: 3vw 6vw;
          margin-top: 5vw;
        }

        #cinematic-text {
          font-size: 1.5rem;
        }
        #final-message {
          font-size: 1.2rem;
          width: 95%;
        }
      }

      /* --- FINAL STAGE: HATI & KATA-KATA --- */
      #finale-stage {
        display: none;
        position: absolute;
        z-index: 20;
        width: 100%;
        height: 100%;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        opacity: 0;
        transition: opacity 2s ease-in;
      }

      .heart {
        position: relative;
        width: 100px;
        height: 100px;
        background: #ff3366;
        transform: rotate(-45deg);
        animation: heartbeat 1.2s infinite;
        box-shadow: 0 0 40px rgba(255, 51, 102, 0.6);
        margin-bottom: 50px;
      }
      .heart::before,
      .heart::after {
        content: "";
        position: absolute;
        width: 100px;
        height: 100px;
        background: #ff3366;
        border-radius: 50%;
      }
      .heart::before {
        top: -50px;
        left: 0;
      }
      .heart::after {
        top: 0;
        left: 50px;
      }

      @keyframes heartbeat {
        0% {
          transform: rotate(-45deg) scale(1);
        }
        15% {
          transform: rotate(-45deg) scale(1.2);
          box-shadow: 0 0 60px rgba(255, 51, 102, 0.8);
        }
        30% {
          transform: rotate(-45deg) scale(1);
        }
        45% {
          transform: rotate(-45deg) scale(1.1);
        }
        60% {
          transform: rotate(-45deg) scale(1);
        }
        100% {
          transform: rotate(-45deg) scale(1);
        }
      }

      #final-message {
        font-family: "Lora", serif;
        font-size: 1.4rem;
        text-align: center;
        color: #ffe6e6;
        width: 85%;
        max-width: 600px;
        line-height: 1.8;
        text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
        min-height: 100px;
      }
    </style>
  </head>
  <body>
    <audio id="bg-music" loop>
      <source src="lagu-romantis-kalian.mp3" type="audio/mpeg" />
    </audio>

    <div id="petal-container"></div>

    <div id="entrance" onclick="startJourney()">
      <div class="pulse-text">Sentuh untuk membuka...</div>
    </div>

    <div id="cinematic-text"></div>

    <div id="main-stage">
      <div class="book-wrapper" id="book-wrapper">
        <div class="book">
          <div class="page" id="page4">
            <div class="front" style="background: #fffde7">
              <h2 class="book-title">Akhir Lembar</h2>
              <p class="book-caption" style="font-size: 1.3rem">Buku ini mungkin usai, tapi cerita kita baru dimulai.</p>
              <button class="btn-love" onclick="showFinale(event)">Buka Hatiku</button>
            </div>
            <div class="back"></div>
          </div>

          <div class="page" id="page3" onclick="flipPage(this, 3)">
            <div class="front">
              <img src="https://images.unsplash.com/photo-1474552226712-ac0f0961a954?q=80&w=400&auto=format&fit=crop" alt="Foto 4" />
              <p class="book-caption">Semua momen ini...</p>
            </div>
            <div class="back">
              <img src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?q=80&w=400&auto=format&fit=crop" alt="Foto 5" />
              <p class="book-caption">Sangat berharga.</p>
            </div>
          </div>

          <div class="page" id="page2" onclick="flipPage(this, 2)">
            <div class="front">
              <img src="https://images.unsplash.com/photo-1522673607200-164d1b6ce486?q=80&w=400&auto=format&fit=crop" alt="Foto 2" />
              <p class="book-caption">Hal favoritku.</p>
            </div>
            <div class="back">
              <img src="https://images.unsplash.com/photo-1516589178581-6cd7833ae3b2?q=80&w=400&auto=format&fit=crop" alt="Foto 3" />
              <p class="book-caption">Adalah senyummu.</p>
            </div>
          </div>

          <div class="page" id="page1" onclick="flipPage(this, 1)">
            <div class="front cover-front">
              <h2>Album Kenangan</h2>
              <p class="book-caption" style="color: #fff">Untukmu, Cantik.</p>
              <p class="tap-hint">(Klik buku untuk membuka)</p>
            </div>
            <div class="back">
              <img src="https://images.unsplash.com/photo-1518049362265-d5b2a6467637?q=80&w=400&auto=format&fit=crop" alt="Foto 1" />
              <p class="book-caption">Awal mula kita.</p>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div id="finale-stage">
      <div class="heart"></div>
      <div id="final-message"></div>
    </div>

    <script>
      const petalContainer = document.getElementById("petal-container");
      for (let i = 0; i < 35; i++) {
        let petal = document.createElement("div");
        petal.className = "petal";
        petal.style.left = Math.random() * 100 + "vw";
        petal.style.animationDuration = Math.random() * 5 + 5 + "s, " + (Math.random() * 3 + 2) + "s";
        petal.style.animationDelay = Math.random() * -10 + "s, " + Math.random() * -10 + "s";
        let size = Math.random() * 8 + 10;
        petal.style.width = size + "px";
        petal.style.height = size + "px";
        petalContainer.appendChild(petal);
      }

      const entrance = document.getElementById("entrance");
      const bgMusic = document.getElementById("bg-music");
      const cinematicText = document.getElementById("cinematic-text");
      const mainStage = document.getElementById("main-stage");

      const scriptLines = ["Ada banyak cara untuk bilang sayang...", "Sebagian lewat kata-kata...", "Dan aku, lewat kode ini.", "Selamat Ulang Tahun."];

      let hasStarted = false;

      async function startJourney() {
        if (hasStarted) return;
        hasStarted = true;

        bgMusic.play().catch((err) => console.log("Audio diblokir:", err));

        entrance.style.opacity = "0";
        setTimeout(() => {
          entrance.style.display = "none";
          petalContainer.style.opacity = "1";
        }, 1500);

        let delay = 2000;
        for (let i = 0; i < scriptLines.length; i++) {
          setTimeout(() => {
            cinematicText.innerText = scriptLines[i];
            cinematicText.style.opacity = "1";
            setTimeout(() => (cinematicText.style.opacity = "0"), 3000);
          }, delay);
          delay += 4500;
        }

        setTimeout(() => {
          mainStage.style.display = "flex";
          setTimeout(() => (mainStage.style.opacity = "1"), 100);
        }, delay + 500);
      }

      let isBookOpen = false;
      const bookWrapper = document.getElementById("book-wrapper");

      function flipPage(pageElement, pageNum) {
        if (!pageElement.classList.contains("flipped")) {
          pageElement.classList.add("flipped");
          setTimeout(() => {
            pageElement.style.zIndex = pageNum;
          }, 200);

          if (!isBookOpen) {
            bookWrapper.classList.add("open");
            isBookOpen = true;
          }
        } else {
          pageElement.classList.remove("flipped");
          pageElement.style.zIndex = 5 - pageNum;

          if (pageNum === 1) {
            bookWrapper.classList.remove("open");
            isBookOpen = false;
          }
        }
      }

      const finaleStage = document.getElementById("finale-stage");
      const finalMessage = document.getElementById("final-message");
      const finalTxt = "Aku mungkin nggak pandai merangkai bunga, tapi aku bisa merancang bangun barisan kode ini khusus dari awal untukmu. I like you, more than you know. Selamat ulang tahun ya...";

      function showFinale(event) {
        event.stopPropagation();
        mainStage.style.opacity = "0";

        setTimeout(() => {
          mainStage.style.display = "none";
          finaleStage.style.display = "flex";
          setTimeout(() => {
            finaleStage.style.opacity = "1";
          }, 100);
          setTimeout(typeFinalMessage, 1500);
        }, 2000);
      }

      let charIndex = 0;
      function typeFinalMessage() {
        if (charIndex < finalTxt.length) {
          finalMessage.innerHTML += finalTxt.charAt(charIndex);
          charIndex++;
          setTimeout(typeFinalMessage, 70);
        }
      }
    </script>
  </body>
</html>
